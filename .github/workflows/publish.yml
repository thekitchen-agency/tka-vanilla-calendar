name: Release and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          npm install -g npm@latest
          npm ci

      - name: Build package
        run: npm run build

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish to npm
        # Only publish if semantic-release successfully created a new release
        # We use a manual publish here to ensure OIDC provenance is triggered correctly
        run: |
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            npm publish --provenance
          else
            echo "No new release to publish."
          fi
